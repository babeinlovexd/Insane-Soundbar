name: Build ICC (Windows EXE)

on:

  push:
    paths:
      - "Insane Control Center/Linux/InsaneControlCenter.py"
      - "Insane Control Center/Linux/logo.png"
      - "Insane Control Center/Linux/logo.ico"

  release:
    types: [published]
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter requests esptool zeroconf pillow pyserial

      - name: Build Executable with PyInstaller
        working-directory: "Insane Control Center/Linux"
        run: |
          pyinstaller -y --noconsole --onefile --name=InsaneControlCenter --icon=logo.ico --add-data="logo.png;." --add-data="logo.ico;." --hidden-import=serial.urlhandler.protocol_socket --collect-data=esptool InsaneControlCenter.py

      - name: Move EXE to Windows Folder
        shell: bash
        run: |
          mkdir -p "Insane Control Center/Windows"
          cp "Insane Control Center/Linux/dist/InsaneControlCenter.exe" "Insane Control Center/Windows/InsaneControlCenter.exe"

      - name: Auto-Commit EXE to Repository
        if: github.event_name != 'release'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-build: Update InsaneControlCenter.exe"
          file_pattern: "Insane Control Center/Windows/InsaneControlCenter.exe"

      - name: Upload Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: "Insane Control Center/Windows/InsaneControlCenter.exe"
