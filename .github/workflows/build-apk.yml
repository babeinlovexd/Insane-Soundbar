name: Build ICC (Android APK)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        working-directory: "Insane Control Center/Android"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet>=0.85.1

      - name: Build APK
        working-directory: "Insane Control Center/Android"
        run: |
          flet build apk --module-name main

      - name: Locate and Move APK
        working-directory: "Insane Control Center/Android"
        shell: bash
        run: |
          APK_PATH=$(find build -name "*.apk" | grep -v "debug" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            mkdir -p release-output
            cp "$APK_PATH" release-output/InsaneControlCenter.apk
            echo "APK_FOUND=true" >> $GITHUB_ENV
          else
            echo "APK_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Upload APK as Release Asset
        if: env.APK_FOUND == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: "Insane Control Center/Android/release-output/InsaneControlCenter.apk"
