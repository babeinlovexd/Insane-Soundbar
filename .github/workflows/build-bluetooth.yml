name: Build Bluetooth Firmware

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Clone custom libraries
        run: |
          mkdir -p Firmware/Bluetooth/lib
          cd Firmware/Bluetooth/lib
          rm -rf ESP32-A2DP arduino-audio-tools
          git clone https://github.com/pschatzmann/ESP32-A2DP.git
          git clone https://github.com/pschatzmann/arduino-audio-tools.git

      - name: Build Firmware
        working-directory: Firmware/Bluetooth
        run: pio run

      - name: Rename Firmware
        working-directory: Firmware/Bluetooth/.pio/build/esp32dev
        run: mv firmware.bin bluetooth_firmware.bin

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Firmware/Bluetooth/.pio/build/esp32dev/bluetooth_firmware.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
