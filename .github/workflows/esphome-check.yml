name: ESPHome Check

on:
  push:
    paths:
      - "Firmware/Master/insane_soundbar.yaml"
  workflow_dispatch:

jobs:
  esphome-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: |
          python -m pip install --upgrade pip
          pip install esphome

      - name: Compile ESPHome YAML
        run: esphome compile Firmware/Master/insane_soundbar.yaml
