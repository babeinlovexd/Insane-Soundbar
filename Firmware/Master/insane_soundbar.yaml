substitutions:
  name: "main-ctrl"
  friendly_name: "Insane Sound Bar Master"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

  on_boot:
    - priority: 800
      then:
        - lambda: |-
            id(isb_orchestrator_inst)->set_master_volume((esphome::template_::TemplateNumber*)id(master_volume));
            id(isb_orchestrator_inst)->set_dsp_version((esphome::template_::TemplateTextSensor*)id(dsp_version));
            id(isb_orchestrator_inst)->set_bt_version((esphome::template_::TemplateTextSensor*)id(bt_version));
            id(isb_orchestrator_inst)->set_sub_version((esphome::template_::TemplateTextSensor*)id(sub_version));
            id(isb_orchestrator_inst)->set_dsp_temp((esphome::template_::TemplateSensor*)id(dsp_temp));
            id(isb_orchestrator_inst)->set_sub_rssi((esphome::template_::TemplateSensor*)id(sub_rssi));
            id(isb_orchestrator_inst)->set_sub_delay((esphome::template_::TemplateSensor*)id(sub_delay));
    - priority: 600
      then:
        - light.turn_on:
            id: status_leds
            effect: "Knight Rider"
            red: 1.0
            green: 0.0
            blue: 0.0
            brightness: 1.0
        - lambda: |-
            id(isb_orchestrator_inst)->set_on_learn_success_callback([]() {
              id(led_rainbow).execute();
            });
            id(isb_orchestrator_inst)->set_on_mute_toggled_callback([](bool muted) {
              if (muted) {
                id(led_mute_pause).execute();
              } else {
                id(led_input_active).execute();
              }
            });
            id(isb_orchestrator_inst)->set_on_standby_callback([]() {
              id(led_standby).execute();
            });

psram:
  mode: octal
  speed: 80MHz

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended

# API & OTA (with secrets)
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Insane-Soundbar Fallback"
    password: !secret ap_password
  on_connect:
    - script.execute: update_led_state
  on_disconnect:
    - light.turn_on:
        id: status_leds
        effect: "WLAN Disconnect"


logger:
  level: DEBUG

# External components
external_components:
  - source:
      type: git
      url: https://github.com/babeinlovexd/Insane-Soundbar
      ref: main
    refresh: 0s
    components: [ isb_orchestrator, stream_server ]

# Enable web server for exposing sensors and versions to PC-Flasher-Tool
web_server:
  port: 80

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"

  - platform: template
    name: "Slave Versions JSON"
    id: slave_versions
    icon: "mdi:information-outline"

  - platform: template
    name: "DSP Version"
    id: dsp_version
  - platform: template
    name: "BT Version"
    id: bt_version
  - platform: template
    name: "SUB Version"
    id: sub_version
  - platform: template
    name: "Active Input"
    id: active_input_sensor
    lambda: |-
      return id(input_source).state; // actually use .state but suppress or just return id(input_source).state;


light:
  - platform: esp32_rmt_led_strip
    id: status_leds
    name: "Soundbar Status"
    pin: GPIO5
    num_leds: 4
    rgb_order: GRB
    chipset: WS2812
    color_correct: [0.6, 0.6, 0.6]
    effects:
      - addressable_scan:
          name: "Knight Rider"
          move_interval: 100ms
          scan_width: 1
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 4
      - strobe:
          name: "WLAN Disconnect"
          colors:
            - state: true
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              duration: 500ms
            - state: false
              duration: 500ms

script:
  - id: led_standby
    then:
      - light.turn_on:
          id: status_leds
          red: 0.5
          green: 0.0
          blue: 0.5
          brightness: 0.5
          effect: "none"

  - id: led_mute_pause
    then:
      - light.turn_on:
          id: status_leds
          red: 1.0
          green: 0.07
          blue: 0.57
          brightness: 0.5
          effect: "none"

  - id: led_input_active
    then:
      - if:
          condition:
            lambda: 'return id(input_source).state == "Bluetooth";'
          then:
            - light.turn_on:
                id: status_leds
                red: 0.0
                green: 0.0
                blue: 1.0
                brightness: 1.0
                effect: "none"
      - if:
          condition:
            lambda: 'return id(input_source).state == "Toslink";'
          then:
            - light.turn_on:
                id: status_leds
                red: 0.0
                green: 1.0
                blue: 1.0
                brightness: 1.0
                effect: "none"
      - if:
          condition:
            lambda: 'return id(input_source).state == "Aux";'
          then:
            - light.turn_on:
                id: status_leds
                red: 1.0
                green: 0.5
                blue: 0.0
                brightness: 1.0
                effect: "none"
      - if:
          condition:
            lambda: 'return id(input_source).state == "WLAN";'
          then:
            - light.turn_on:
                id: status_leds
                red: 1.0
                green: 1.0
                blue: 1.0
                brightness: 1.0
                effect: "none"

  - id: led_rainbow
    then:
      - light.turn_on:
          id: status_leds
          effect: "Rainbow"
          brightness: 1.0
      - delay: 3s
      - script.execute: update_led_state

  - id: update_led_state
    mode: restart
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - if:
                condition:
                  lambda: 'return id(isb_orchestrator_inst).is_muted();'
                then:
                  - script.execute: led_mute_pause
                else:
                  - script.execute: led_input_active
          else:
            - light.turn_on:
                id: status_leds
                effect: "WLAN Disconnect"

# I2C Bus setup
i2c:
  - id: i2c_bus
    sda: GPIO12
    scl: GPIO13
    scan: true

i2s_audio:
  - id: i2s_bus_out
    i2s_bclk_pin: GPIO11
    i2s_lrclk_pin: GPIO10

speaker:
  - platform: i2s_audio
    id: isb_i2s_speaker
    dac_type: external
    i2s_audio_id: i2s_bus_out
    i2s_dout_pin: GPIO9
    channel: stereo
    use_apll: false
    i2s_comm_fmt: stand_i2s

  - platform: mixer
    id: isb_mixer
    output_speaker: isb_i2s_speaker
    queue_mode: true
    source_speakers:
      - id: media_spk_mixer_input
      - id: announcement_spk_mixer_input

media_player:
  - platform: speaker
    name: "Insane Sound Bar"
    id: isb_media_player
    codec_support_enabled: all
    media_pipeline:
      speaker: media_spk_mixer_input
      format: FLAC
      num_channels: 2
    announcement_pipeline:
      speaker: announcement_spk_mixer_input
      format: FLAC
      num_channels: 2
    # Status-Sync mit dem RP2354 DSP (Reg 0x02)
    on_play:
      - lambda: 'id(isb_orchestrator_inst).set_mute(false);'
      - script.execute: led_input_active
    on_pause:
      - lambda: 'id(isb_orchestrator_inst).set_mute(true);'
      - script.execute: led_mute_pause
    on_idle:
      - lambda: 'id(isb_orchestrator_inst).set_mute(true);'
      - script.execute: led_standby


# UARTs for Stream Server (Flash-Hub)
uart:
  - id: uart_dsp
    tx_pin: GPIO38
    rx_pin: GPIO48
    baud_rate: 1000000
  - id: uart_sub
    tx_pin: GPIO43
    rx_pin: GPIO44
    baud_rate: 115200
  - id: uart_bt
    tx_pin: GPIO2
    rx_pin: GPIO1
    baud_rate: 115200

# Stream Servers
stream_server:
  - id: stream_dsp
    uart_id: uart_dsp
    port: 8081
  - id: stream_sub
    uart_id: uart_sub
    port: 8082
  - id: stream_bt
    uart_id: uart_bt
    port: 8083

# Font for Display
font:
  - file: "gfonts://Roboto"
    id: roboto_12
    size: 12
  - file: "gfonts://Roboto"
    id: roboto_24
    size: 24

# Display Setup
display:
  - platform: ssd1306_i2c
    model: "SH1106 128x64"
    id: oled_display
    i2c_id: i2c_bus
    address: 0x3C
    update_interval: 1s
    lambda: |-
      // Setup offsets to prevent burn-in
      int ox = id(display_shift_x);
      int oy = id(display_shift_y);

      // Draw Input
      it.printf(ox + 64, oy + 20, id(roboto_24), TextAlign::TOP_CENTER, "%s", id(current_input_text).c_str());

      // Draw Volume Overlay if active
      if (id(volume_overlay_timer) > 0) {
        it.printf(ox + 64, oy + 40, id(roboto_12), TextAlign::TOP_CENTER, "Vol: %d", id(isb_orchestrator_inst).get_volume());
        id(volume_overlay_timer) -= 1;
      }

      // Status Indicators
      if (id(isb_orchestrator_inst).is_sub_connected()) {
        it.print(ox + 0, oy + 50, id(roboto_12), "SW");
      }
      if (id(isb_orchestrator_inst).is_bt_connected()) {
        it.print(ox + 110, oy + 50, id(roboto_12), "BT");
      }

# Variables for Display
globals:
  - id: display_shift_x
    type: int
    initial_value: '0'
  - id: display_shift_y
    type: int
    initial_value: '0'
  - id: volume_overlay_timer
    type: int
    initial_value: '0'
  - id: current_input_text
    type: std::string
    initial_value: '"WLAN"'

# Interval for Display Shift and Version Updating
interval:
  - interval: 2min
    then:
      - lambda: |-
          id(display_shift_x) = (id(display_shift_x) + 1) % 3;
          id(display_shift_y) = (id(display_shift_y) + 1) % 3;
  - interval: 60s
    then:
      - lambda: |-
          id(isb_orchestrator_inst).update_versions();

# Custom ISB Orchestrator Component
isb_orchestrator:
  id: isb_orchestrator_inst
  i2c_id: i2c_bus
  versions_sensor: slave_versions
  fault_sensor: tpa_fault_sensor

# Integration of IR receiver to Orchestrator
remote_receiver:
  - id: ir_receiver_module
    pin: GPIO4
    dump: [nec, rc5]
    tolerance: 50%
    on_nec:
      then:
        - lambda: |-
            id(isb_orchestrator_inst).handle_ir_code(x.address << 16 | x.command);
            id(volume_overlay_timer) = 3; // Show volume for 3 ticks (3 sec)
    on_rc5:
      then:
        - lambda: |-
            id(isb_orchestrator_inst).handle_ir_code(x.address << 16 | x.command);
            id(volume_overlay_timer) = 3;

# Provide HA interface for IR Learning
select:
  - platform: template
    name: "IR Learn Target"
    id: ir_learn_target
    options:
      - "None"
      - "Vol+"
      - "Vol-"
      - "Mute"
      - "Input Next"
      - "Play"
      - "Pause"
      - "Prev"
      - "Next"
    initial_option: "None"
    optimistic: true

  - platform: template
    name: "Input Source"
    id: input_source
    options:
      - "Toslink"
      - "Aux"
      - "Bluetooth"
      - "WLAN"
    set_action:
      - lambda: |-
          id(isb_orchestrator_inst).set_input(x);
          id(current_input_text) = x;           // NEU: Updated das OLED-Display
          id(input_source).publish_state(x);    // NEU: Updated die Anzeige in Home Assistant
          id(led_input_active).execute();


button:
  - platform: template
    name: "Media Play"
    icon: "mdi:play"
    on_press:
      - lambda: 'id(isb_orchestrator_inst).send_media_command(0x01);'
  - platform: template
    name: "Media Pause"
    icon: "mdi:pause"
    on_press:
      - lambda: 'id(isb_orchestrator_inst).send_media_command(0x02);'
  - platform: template
    name: "Media Next"
    icon: "mdi:skip-next"
    on_press:
      - lambda: 'id(isb_orchestrator_inst).send_media_command(0x03);'
  - platform: template
    name: "Media Prev"
    icon: "mdi:skip-previous"
    on_press:
      - lambda: 'id(isb_orchestrator_inst).send_media_command(0x04);'

  - platform: template
    name: "Alle IR-Codes löschen"
    id: btn_clear_ir
    icon: "mdi:delete-sweep"
    on_press:
      - lambda: |-
          id(isb_orchestrator_inst).clear_all_ir_codes();
          esp_restart();

  - platform: restart
    name: "Master Restart"

  - platform: template
    name: "Flash Mode: Bluetooth (ESP32)"
    id: btn_flash_bt
    icon: "mdi:cellphone-link"
    on_press:
      - switch.turn_off: bt_boot_pin
      - delay: 50ms
      - switch.turn_off: bt_en_pin
      - delay: 100ms
      - switch.turn_on: bt_en_pin
      - delay: 100ms
      - switch.turn_on: bt_boot_pin

  - platform: template
    name: "Flash Mode: Sub-TX (ESP32)"
    id: btn_flash_sub
    icon: "mdi:speaker-wireless"
    on_press:
      - switch.turn_off: sub_boot_pin
      - delay: 50ms
      - switch.turn_off: sub_en_pin
      - delay: 100ms
      - switch.turn_on: sub_en_pin
      - delay: 100ms
      - switch.turn_on: sub_boot_pin

  - platform: template
    name: "Flash Mode: DSP (RP2354)"
    id: btn_flash_dsp
    icon: "mdi:chip"
    on_press:
      - switch.turn_off: dsp_boot_pin
      - switch.turn_on: dsp_bootsel_pin
      - delay: 50ms
      - switch.turn_off: dsp_en_pin
      - delay: 100ms
      - switch.turn_on: dsp_en_pin
      - delay: 100ms
      - switch.turn_on: dsp_boot_pin
      - switch.turn_off: dsp_bootsel_pin

  - platform: template
    name: "Start IR Learn"
    on_press:
      - lambda: |-
          if (id(ir_learn_target).current_option() != "None") {
            id(isb_orchestrator_inst).enable_learn_mode(id(ir_learn_target).current_option());
          } else {
            ESP_LOGW("ISB_ORCH", "Select a target first!");
          }

  - platform: template
    name: "Pair Subwoofer"
    icon: "mdi:speaker-wireless"
    on_press:
      - lambda: 'id(isb_orchestrator_inst).pair_subwoofer();'



binary_sensor:
  - platform: template
    name: "Verstärker Überlastung (Fault)"
    id: tpa_fault_sensor
    device_class: problem
    entity_category: diagnostic
  - platform: template
    name: "Mute Status"
    id: mute_status
    lambda: |-
      return id(isb_orchestrator_inst).is_muted();

debug:

sensor:
  - platform: uptime
    name: "System Uptime"
    id: system_uptime
  - platform: wifi_signal
    name: "WLAN Signal"
    update_interval: 60s
  - platform: debug
    free:
      name: "Free RAM"
  - platform: internal_temperature
    name: "Master Temperature"
  - platform: template
    name: "DSP Temperature"
    id: dsp_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 0
  - platform: template
    name: "Subwoofer RSSI"
    id: sub_rssi
    unit_of_measurement: "dBm"
    accuracy_decimals: 0
  - platform: template
    name: "Subwoofer Buffer Delay"
    id: sub_delay
    unit_of_measurement: "ms"
    accuracy_decimals: 0

switch:
  - platform: gpio
    pin: GPIO17
    name: "DSP Flash EN"
    id: dsp_en_pin
    internal: true
  - platform: gpio
    pin: GPIO21
    name: "DSP Flash CS"
    id: dsp_boot_pin
    internal: true
  - platform: gpio
    pin: GPIO47
    name: "DSP Flash SD1"
    id: dsp_bootsel_pin
    internal: true
  - platform: gpio
    pin: GPIO40
    name: "BT Flash EN"
    id: bt_en_pin
    internal: true
  - platform: gpio
    pin: GPIO15
    name: "BT Flash BOOT"
    id: bt_boot_pin
    internal: true
  - platform: gpio
    pin: GPIO41
    name: "SUB Flash EN"
    id: sub_en_pin
    internal: true
  - platform: gpio
    pin: GPIO39
    name: "SUB Flash BOOT"
    id: sub_boot_pin
    internal: true
  - platform: template
    name: "Night Mode (DRC)"
    id: switch_night_mode
    optimistic: true
    turn_on_action:
      - lambda: 'id(isb_orchestrator_inst).set_night_mode(true);'
    turn_off_action:
      - lambda: 'id(isb_orchestrator_inst).set_night_mode(false);'
  - platform: template
    name: "Clear Voice"
    id: switch_clear_voice
    optimistic: true
    turn_on_action:
      - lambda: 'id(isb_orchestrator_inst).set_clear_voice(true);'
    turn_off_action:
      - lambda: 'id(isb_orchestrator_inst).set_clear_voice(false);'


number:
  - platform: template
    name: "Master Volume"
    id: master_volume
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_volume(x);'
  - platform: template
    name: "EQ 100 Hz (Bass)"
    id: eq_b1
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_eq(1, x);'
  - platform: template
    name: "EQ 300 Hz (Low-Mid)"
    id: eq_b2
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_eq(2, x);'
  - platform: template
    name: "EQ 1 kHz (Mid)"
    id: eq_b3
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_eq(3, x);'
  - platform: template
    name: "EQ 3 kHz (High-Mid)"
    id: eq_b4
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_eq(4, x);'
  - platform: template
    name: "EQ 8 kHz (Treble)"
    id: eq_b5
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_eq(5, x);'
  - platform: template
    name: "Sub Trim"
    id: sub_trim
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_sub_eq(x);'
  - platform: template
    name: "Mid Trim"
    id: mid_trim
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 10
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_mid_eq(x);'
  - platform: template
    name: "High Trim"
    id: high_trim
    optimistic: true
    min_value: 0
    max_value: 20
    step: 1
    initial_value: 4
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_high_eq(x);'
  - platform: template
    name: "Sub LP Crossover"
    id: sub_lp
    optimistic: true
    min_value: 50
    max_value: 255
    step: 1
    initial_value: 120
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_crossover("Sub LP", x);'
  - platform: template
    name: "Sat HP Crossover"
    id: sat_hp
    optimistic: true
    min_value: 50
    max_value: 255
    step: 1
    initial_value: 95
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_crossover("Sat HP", x);'
  - platform: template
    name: "Mid LP Crossover"
    id: mid_lp
    optimistic: true
    min_value: 500
    max_value: 10000
    step: 100
    initial_value: 3500
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_crossover("Mid LP", x);'
  - platform: template
    name: "High HP Crossover"
    id: high_hp
    optimistic: true
    min_value: 500
    max_value: 10000
    step: 100
    initial_value: 3500
    set_action:
      - lambda: 'id(isb_orchestrator_inst).set_crossover("High HP", x);'
  - platform: template
    name: "OLED Brightness"
    id: oled_brightness
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 100
    set_action:
      - lambda: 'id(oled_display).set_contrast(x / 100.0);'
